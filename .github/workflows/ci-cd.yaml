permissions:
  contents: write

name: CI-CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'orbit-manifests/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/orbit-api:${TAG} ./app/backend
          docker tag ${{ secrets.DOCKER_USERNAME }}/orbit-api:${TAG} ${{ secrets.DOCKER_USERNAME }}/orbit-api:latest

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/orbit-api:${TAG}
          docker push ${{ secrets.DOCKER_USERNAME }}/orbit-api:latest

      - name: Update Kubernetes manifest
        working-directory: orbit-manifests
        run: |
          sed -i "s|image: .*orbit-api:.*|image: ${{ secrets.DOCKER_USERNAME }}/orbit-api:${TAG}|g" orbit-api-deployment.yaml      

      - name: Commit & push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Update image to ${TAG}" || echo "No changes to commit"
          git push
